<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签分类 - QbinAI 每日资讯</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">QbinAI 每日资讯</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="tags.html" class="active">标签</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container">
    <header class="page-header">
      <h1 id="pageTitle">标签分类</h1>
      <p class="subtitle" id="pageSubtitle">探索感兴趣的主题</p>
    </header>

    <!-- 标签云视图 -->
    <div id="tagsCloudView">
      <div class="tags-cloud" id="tagsCloud">
        <!-- 标签将由 JavaScript 动态生成 -->
        <div class="loading">正在加载标签...</div>
      </div>
    </div>

    <!-- 文章列表视图（按标签筛选） -->
    <div id="articlesView" style="display: none;">
      <button class="back-btn" id="backBtn">← 返回标签云</button>
      <div class="articles-grid" id="filteredArticles">
        <!-- 筛选后的文章列表 -->
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 QbinAI 每日资讯. 由 <a href="https://github.com/" target="_blank">Markdown</a> + <a href="https://marked.js.org/" target="_blank">marked.js</a> 驱动.</p>

  <script src="js/utils.js"></script>
  <script src="js/tags.js"></script>
