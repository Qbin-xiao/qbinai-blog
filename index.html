<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QbinAI 每日资讯</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">QbinAI 每日资讯</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="tags.html">标签</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
    </div>
  </nav>

    <!-- 主内容区 -->
    <main class="container">
      <header class="page-header">
        <h1>最新资讯</h1>
        <p class="subtitle">探索 AI 世界的前沿动态与技术突破</p>
      </header>

      <!-- 搜索框 -->
      <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="搜索文章...">
        <button id="searchClear" class="search-clear" style="display: none;">✕</button>
      </div>

      <!-- 文章列表（杂志式布局） -->
      <div class="articles-grid" id="articlesGrid">
        <!-- 文章卡片将由 JavaScript 动态生成 -->
      </div>

      <!-- 分页控件 -->
      <div class="pagination" id="pagination">
        <!-- 分页按钮将由 JavaScript 动态生成 -->
      </div>
    </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 QbinAI 每日资讯. 由 <a href="https://github.com/" target="_blank">Markdown</a> + <a href="https://marked.js.org/" target="_blank">marked.js</a> 驱动.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
