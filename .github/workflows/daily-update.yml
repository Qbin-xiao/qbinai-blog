name: 每日 AI 资讯自动更新

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交代码
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: 运行自动更新脚本
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cd scripts
          python auto_update.py
          
      - name: 提交并推送更新
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 检查是否有新文章
          if [[ -n $(git status -s) ]]; then
            git add ..
            git commit -m "自动更新：每日 AI 资讯 $(date +'%Y-%m-%d')"
            git push
            echo "已推送新文章"
          else
            echo "没有新文章"
          fi
          
      - name: 触发 GitHub Pages 重建
        run: |
          # 如果使用 GitHub Pages，推送后会自动重建
          echo "GitHub Pages 将自动重建"
